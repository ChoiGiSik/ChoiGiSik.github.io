<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사진으로 단어 추가 📷</title>
    <!-- Supabase JS 라이브러리 추가 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Jua', 'sans-serif'],
                    },
                    colors: {
                        pastel: {
                            bg: '#FFF8E7',
                            primary: '#FFB6C1', // pinkish
                            secondary: '#AEE1E1', // mint
                            card: '#FFFFFF',
                            green: '#D4EDDA',
                            purple: '#E2D5F8',
                            orange: '#FFD8A8',
                            blue: '#D0E8FF'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Jua', sans-serif;
        }
    </style>
</head>

<body class="bg-pastel-bg min-h-screen text-gray-800 flex flex-col items-center py-10 px-4 overflow-x-hidden relative">

    <!-- Hamburger Menu Button -->
    <button id="menuOpenBtn"
        class="fixed top-4 left-4 sm:top-6 sm:left-6 z-30 p-2 sm:p-3 bg-white rounded-xl shadow-md border-2 border-pink-200 text-pink-500 hover:bg-pink-50 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 sm:h-8 sm:w-8" fill="none" viewBox="0 0 24 24"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
    </button>

    <!-- Sidebar Overlay -->
    <div id="menuOverlay" class="fixed inset-0 bg-black/40 z-40 hidden opacity-0 transition-opacity duration-300"></div>

    <!-- Slide-out Menu -->
    <nav id="sideMenu"
        class="fixed top-0 left-0 h-full w-64 bg-pastel-card shadow-2xl z-50 transform -translate-x-full transition-transform duration-300 flex flex-col border-r-4 border-blue-200">
        <div class="p-6 border-b-2 border-dashed border-blue-200 flex justify-between items-center bg-blue-50">
            <h2 class="text-2xl font-bold text-blue-500">✨ 메뉴</h2>
            <button id="menuCloseBtn" class="text-gray-400 hover:text-blue-500 transition-colors p-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
        <div class="p-6 flex flex-col gap-4 text-xl">
            <a href="index.html"
                class="flex items-center gap-3 p-3 rounded-xl hover:bg-pink-50 text-gray-700 hover:text-pink-600 transition-colors">
                <span>🏠</span> 단어 학습 (홈)
            </a>
            <a href="add-word.html"
                class="flex items-center gap-3 p-3 rounded-xl hover:bg-orange-50 text-gray-700 hover:text-orange-600 transition-colors">
                <span>➕</span> 단어 하나씩 추가
            </a>
            <a href="camera-word.html"
                class="flex items-center gap-3 p-3 rounded-xl bg-blue-50 text-blue-600 transition-colors shadow-sm border border-blue-100 font-bold">
                <span>📷</span> 사진으로 단어 캡처
            </a>
            <a href="delete-word.html"
                class="flex items-center gap-3 p-3 rounded-xl hover:bg-red-50 text-gray-700 hover:text-red-500 transition-colors">
                <span>🗑️</span> 단어 관리/삭제
            </a>
        </div>
    </nav>

    <header class="text-center mb-8 mt-4">
        <h1 class="text-3xl md:text-5xl font-bold text-blue-500 drop-shadow-md pb-2">
            📷 찰칵! 영단어 캡처 📷
        </h1>
        <p class="text-lg md:text-xl mt-4 text-gray-500">사진을 찍으면 인공지능이 영단어를 찾아줘요!</p>
    </header>

    <main class="w-full max-w-4xl bg-pastel-card rounded-3xl shadow-xl p-6 md:p-8 border-4 border-pastel-secondary">

        <!-- 단원 입력 -->
        <div class="mb-6 p-4 bg-blue-100 rounded-2xl border-2 border-blue-300 shadow-sm text-center">
            <label class="block text-blue-800 font-bold text-xl mb-2">📚 사진 속 단어들이 들어갈 강의명</label>
            <input type="text" id="f_lesson" class="w-full max-w-sm mx-auto block p-3 border-2 border-blue-400 rounded-lg text-xl focus:border-blue-600 outline-none text-center"
                placeholder="예: 1단원, 유닛 3">
        </div>

        <!-- 업로드 영역 -->
        <div class="mb-8 p-6 bg-blue-50 rounded-2xl border-2 border-pastel-blue shadow-inner text-center">
            <label for="imageInput"
                class="cursor-pointer flex flex-col items-center justify-center p-8 bg-white border-4 border-dashed border-blue-300 rounded-2xl hover:bg-blue-100 transition-colors">
                <span class="text-6xl mb-4 text-blue-400">📸</span>
                <span class="text-2xl text-blue-600 font-bold text-center">여기를 눌러 사진을 찍거나 고르세요!</span>
                <input type="file" id="imageInput" accept="image/*" class="hidden">
            </label>
            <div id="imagePreviewContainer" class="hidden mt-6 flex flex-col items-center">
                <img id="imagePreview" src="" alt="미리보기"
                    class="max-h-64 rounded-xl border-4 border-purple-200 shadow-md">
                <button id="extractBtn"
                    class="mt-4 bg-purple-500 hover:bg-purple-600 text-white text-2xl font-bold py-3 px-8 rounded-xl shadow-lg transition-transform active:scale-95">
                    ✨ 마법으로 단어 찾기 ✨
                </button>
            </div>
            <div id="aiLoading" class="hidden mt-6 text-xl text-purple-500 font-bold animate-pulse">
                인공지능이 사진 속 영단어를 열심히 찾고 있어요... 🔮✨
            </div>
        </div>

        <!-- 추출된 단어 목록 (초기엔 숨김) -->
        <div id="resultContainer" class="hidden">
            <h2 class="text-3xl font-bold text-purple-600 mb-4">✨ 찾은 단어들 ✨</h2>
            <div class="overflow-x-auto rounded-xl border-2 border-gray-100 shadow-inner mb-6">
                <table class="w-full min-w-[600px] text-left border-collapse">
                    <thead>
                        <tr class="bg-purple-50 border-b-2 border-purple-200 text-purple-700 text-lg">
                            <th class="p-3 whitespace-nowrap text-center">단어/이모지</th>
                            <th class="p-3 whitespace-nowrap">한글 읽기</th>
                            <th class="p-3 min-w-[150px]">뜻</th>
                            <th class="p-3 whitespace-nowrap text-center">제외</th>
                        </tr>
                    </thead>
                    <tbody id="extractedWordsBody">
                        <!-- JS로 동적 생성 -->
                    </tbody>
                </table>
            </div>

            <button id="saveAllBtn"
                class="w-full bg-pastel-primary hover:bg-pink-500 text-white text-3xl font-bold py-4 px-6 rounded-xl shadow-lg transition-transform active:scale-95 flex justify-center items-center gap-2 disabled:opacity-50">
                <span>저장소에 전부 쏙~ 넣기! 🎁</span>
            </button>
        </div>

    </main>

    <script>
        // === 1. 설정 및 초기화 ===
        let GEMINI_API_KEY = localStorage.getItem("GEMINI_API_KEY") || "";
        const SUPABASE_URL = "https://garhzjqrzvagbhtbmxdk.supabase.co";
        // Public API keys shouldn't be fully trusted, but assuming user RLS is configured.
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdhcmh6anFyenZhZ2JodGJteGRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNjY0OTgsImV4cCI6MjA5MDc0MjQ5OH0.ZPk8KWSR0elGXUCOsgu7CADXG6PUxgx7IqE6m2QALRg";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let extractedWords = []; // 추출된 단어들을 보관하는 배열
        let base64Image = null;
        let imageMimeType = null;

        // === Sidebar Menu Logic ===
        const menuOpenBtn = document.getElementById("menuOpenBtn");
        const menuCloseBtn = document.getElementById("menuCloseBtn");
        const sideMenu = document.getElementById("sideMenu");
        const menuOverlay = document.getElementById("menuOverlay");

        function toggleMenu(isOpen) {
            if (isOpen) {
                menuOverlay.classList.remove("hidden");
                setTimeout(() => menuOverlay.classList.remove("opacity-0"), 10);
                sideMenu.classList.remove("-translate-x-full");
            } else {
                menuOverlay.classList.add("opacity-0");
                sideMenu.classList.add("-translate-x-full");
                setTimeout(() => menuOverlay.classList.add("hidden"), 300);
            }
        }
        menuOpenBtn.addEventListener('click', () => toggleMenu(true));
        menuCloseBtn.addEventListener('click', () => toggleMenu(false));
        menuOverlay.addEventListener('click', () => toggleMenu(false));

        // === 2. DOM 요소 ===
        const imageInput = document.getElementById('imageInput');
        const imagePreviewContainer = document.getElementById('imagePreviewContainer');
        const imagePreview = document.getElementById('imagePreview');
        const extractBtn = document.getElementById('extractBtn');
        const aiLoading = document.getElementById('aiLoading');

        const resultContainer = document.getElementById('resultContainer');
        const extractedWordsBody = document.getElementById('extractedWordsBody');
        const saveAllBtn = document.getElementById('saveAllBtn');
        const f_lesson = document.getElementById('f_lesson');

        f_lesson.value = localStorage.getItem("LAST_USED_LESSON") || "미지정";

        // === 3. 이미지 업로드 로직 ===
        imageInput.addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;

            // 파일 타입 저장
            imageMimeType = file.type;

            const reader = new FileReader();
            reader.onload = function (event) {
                const dataUrl = event.target.result;
                imagePreview.src = dataUrl;
                // Base64 데이터만 추출 (data:image/jpeg;base64,... 에서 콤마 이후)
                base64Image = dataUrl.split(',')[1];

                imagePreviewContainer.classList.remove('hidden');
                resultContainer.classList.add('hidden'); // 기존 결과 숨김
            };
            reader.readAsDataURL(file);
        });

        // === 4. Gemini API 호출 로직 ===
        extractBtn.addEventListener('click', async () => {
            if (!base64Image) {
                alert('먼저 카메라로 사진을 찍거나 이미지를 선택해주세요!');
                return;
            }

            if (!GEMINI_API_KEY) {
                const userInput = prompt("💡 사진 분석을 위해 구글 Gemini API 키가 필요합니다.\n\n발급받은 구글 Gemini API 키를 입력해 주세요.\n(한 번 입력하면 기기에 안전하게 저장됩니다.)");
                if (userInput && userInput.trim() !== "") {
                    GEMINI_API_KEY = userInput.trim();
                    localStorage.setItem("GEMINI_API_KEY", GEMINI_API_KEY);
                } else {
                    alert("⚠️ API 키가 없으면 영어 단어를 찾을 수 없습니다.");
                    return;
                }
            }

            extractBtn.disabled = true;
            aiLoading.classList.remove('hidden');
            resultContainer.classList.add('hidden');
            extractedWords = []; // 리셋

            const promptText = `너는 초등학교 어린이 영어 교육 앱의 콘텐츠 제작자이자 똑똑한 비전 분석 AI야.
업로드된 이미지를 주의 깊게 보고, 이미지 안에 있는 "가장 뜻깊고 유의미한 영어 단어들"을 모두 추출해 줘. (1개부터 최대 10개까지만)
의미 없는 텍스트 조각이나 노이즈는 무시하고 명확한 영단어만 골라줘.

각 단어별로 아래 JSON 형식을 엄격히 지켜서 **배열(Array)** 형태로 반환해줘! 순수 JSON만 반환해!!

[
  {
    "word": "추출한 영단어",
    "emoji": "해당 단어와 제일 잘 어울리는 귀여운 이모지 1개",
    "phonetic": "단어의 영어 발음기호 (반드시 슬래시 포함, 예: / æp(ə)l /)",
    "how_to_read": "한국인 초등학생 5~6학년이 읽기 편한 한글 발음 (예: 애플)",
    "meaning": "단어의 핵심 뜻 한국어 1~2단어 (괄호 열고 아이들이 이해하기 쉬운 친절한 부연설명 작성 괄호 닫기)",
    "example_en": "초등학생 수준의 쉽고 재미있는 영어 예문 (반드시 추출한 <span class=\\"bg-yellow-200 px-2 rounded-lg text-purple-900 mx-1\\">해당단어</span> 형식태그로 감싸기)",
    "example_ko": "해당 예문의 한글 해석"
  }
]`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [
                            {
                                parts: [
                                    { text: promptText },
                                    { inlineData: { mimeType: imageMimeType, data: base64Image } }
                                ]
                            }
                        ],
                        generationConfig: {
                            temperature: 0.5,
                            responseMimeType: "application/json"
                        }
                    })
                });

                if (!response.ok) {
                    if (response.status === 403 || response.status === 400 || response.status === 404) {
                        localStorage.removeItem("GEMINI_API_KEY");
                        GEMINI_API_KEY = "";
                        throw new Error(`API 연동 오류 (${response.status}) 🚨\n입력하신 키가 잘못되었거나 구글에 의해 사용이 중지되었습니다.\n팝업 확인 후 다시 버튼을 클릭하여 새 키를 입력해 주세요.`);
                    }
                    throw new Error(`API 호출에 실패했습니다. (HTTP ${response.status})\n잠시 후 다시 시도해 주세요.`);
                }

                const result = await response.json();
                let jsonText = result.candidates[0].content.parts[0].text;

                // 마크다운 흔적 제거 처리
                jsonText = jsonText.replace(/```json/g, '').replace(/```/g, '').trim();

                extractedWords = JSON.parse(jsonText);

                if (!Array.isArray(extractedWords) || extractedWords.length === 0) {
                    throw new Error("사진에서 적절한 영어 단어를 찾지 못했습니다.");
                }

                renderExtractedWords();

            } catch (err) {
                console.error(err);
                alert(err.message || '사진 분석 중 오류가 발생했습니다. 개발자 도구의 콘솔을 확인해주세요.');
            } finally {
                extractBtn.disabled = false;
                aiLoading.classList.add('hidden');
            }
        });

        // === 5. 추출된 단어들을 UI(Table)에 그리기 ===
        function renderExtractedWords() {
            extractedWordsBody.innerHTML = '';

            extractedWords.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-purple-100 hover:bg-purple-50 transition-colors";
                tr.innerHTML = `
                    <td class="p-3 text-2xl font-bold text-gray-800 text-center whitespace-nowrap">
                        ${item.word} <span class="text-3xl ml-1">${item.emoji || ''}</span>
                    </td>
                    <td class="p-3 text-teal-700 text-xl font-bold whitespace-nowrap">
                        ${item.how_to_read || ''}
                    </td>
                    <td class="p-3 text-gray-600 text-lg min-w-[150px] break-keep">
                        ${item.meaning || ''}
                    </td>
                    <td class="p-3 text-center">
                        <button onclick="removeWordFromList(${index})" class="bg-gray-100 hover:bg-red-500 text-gray-500 hover:text-white p-2 rounded-xl border border-gray-200 transition-colors">
                            ❌
                        </button>
                    </td>
                `;
                extractedWordsBody.appendChild(tr);
            });

            resultContainer.classList.remove('hidden');
            saveAllBtn.disabled = false;
        }

        // 특정 단어 리스트에서 제외 (저장하지 않음)
        window.removeWordFromList = function (index) {
            extractedWords.splice(index, 1);
            if (extractedWords.length === 0) {
                resultContainer.classList.add('hidden');
            } else {
                renderExtractedWords();
            }
        };

        // === 6. Supabase에 전체 리스트 한 번에 넣기 (Bulk Insert) ===
        saveAllBtn.addEventListener('click', async () => {
            if (extractedWords.length === 0) return;

            const lessonName = f_lesson.value.trim() || '미지정';
            localStorage.setItem("LAST_USED_LESSON", lessonName);

            const confirmed = confirm(`총 ${extractedWords.length}개의 단어를 '${lessonName}' 단어장에 쏙~ 저장할까요? 🎁`);
            if (!confirmed) return;

            // 각 단어에 사용자가 입력한 lesson 값을 추가하여 저장할 배열 생성
            const wordsToInsert = extractedWords.map(w => ({ ...w, lesson: lessonName }));

            saveAllBtn.disabled = true;
            saveAllBtn.innerHTML = "열심히 저장하는 중... ⏳";

            try {
                // Supabase 다중 insert 구문 (배열 통째로 넣기)
                const { error } = await supabaseClient
                    .from('words')
                    .insert(wordsToInsert);

                if (error) {
                    throw error;
                }

                alert(`🎉 훌륭해요! ${extractedWords.length}개의 새로운 단어가 성공적으로 저장되었습니다!`);
                // 입력 상태 폼 초기화
                extractedWords = [];
                resultContainer.classList.add('hidden');
                imagePreviewContainer.classList.add('hidden');
                base64Image = null;
                imagePreview.src = "";
                imageInput.value = "";

            } catch (err) {
                console.error(err);
                alert(`저장 중 에러가 발생했습니다: ${err.message}`);
            } finally {
                saveAllBtn.disabled = false;
                saveAllBtn.innerHTML = "<span>저장소에 전부 쏙~ 넣기! 🎁</span>";
            }
        });

    </script>
</body>

</html>
