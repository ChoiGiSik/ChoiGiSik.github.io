<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단어 추가 마법상자 ✨</title>
    <!-- Supabase JS 라이브러리 추가 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- 구글 폰트(Jua: 귀엽고 둥근 한국어 폰트) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Jua', 'sans-serif'],
                    },
                    colors: {
                        pastel: {
                            bg: '#FFF8E7',
                            primary: '#FFB6C1',
                            secondary: '#AEE1E1',
                            card: '#FFFFFF',
                            green: '#D4EDDA',
                            purple: '#E2D5F8',
                            orange: '#FFD8A8',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Jua', sans-serif;
        }
    </style>
</head>

<body class="bg-pastel-bg min-h-screen text-gray-800 flex flex-col items-center py-10 px-4 overflow-x-hidden relative">

    <!-- Hamburger Menu Button -->
    <button id="menuOpenBtn"
        class="fixed top-4 left-4 sm:top-6 sm:left-6 z-30 p-2 sm:p-3 bg-white rounded-xl shadow-md border-2 border-pink-200 text-pink-500 hover:bg-pink-50 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 sm:h-8 sm:w-8" fill="none" viewBox="0 0 24 24"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
    </button>

    <!-- Sidebar Overlay -->
    <div id="menuOverlay" class="fixed inset-0 bg-black/40 z-40 hidden opacity-0 transition-opacity duration-300"></div>

    <!-- Slide-out Menu -->
    <nav id="sideMenu"
        class="fixed top-0 left-0 h-full w-64 bg-pastel-card shadow-2xl z-50 transform -translate-x-full transition-transform duration-300 flex flex-col border-r-4 border-orange-200">
        <div class="p-6 border-b-2 border-dashed border-orange-200 flex justify-between items-center bg-orange-50">
            <h2 class="text-2xl font-bold text-orange-500">✨ 메뉴</h2>
            <button id="menuCloseBtn" class="text-gray-400 hover:text-orange-500 transition-colors p-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
        <div class="p-6 flex flex-col gap-4 text-xl">
            <a href="index.html"
                class="flex items-center gap-3 p-3 rounded-xl hover:bg-pink-50 text-gray-700 hover:text-pink-600 transition-colors">
                <span>🏠</span> 단어 학습 (홈)
            </a>
            <a href="add-word.html"
                class="flex items-center gap-3 p-3 rounded-xl bg-orange-50 text-orange-600 transition-colors shadow-sm border border-orange-100 font-bold">
                <span>➕</span> 단어 추가하기
            </a>
            <a href="delete-word.html"
                class="flex items-center gap-3 p-3 rounded-xl hover:bg-red-50 text-gray-700 hover:text-red-500 transition-colors">
                <span>🗑️</span> 단어 관리/삭제
            </a>
        </div>
    </nav>

    <header class="text-center mb-8 mt-4">
        <h1 class="text-3xl md:text-5xl font-bold text-pink-500 drop-shadow-md pb-2">
            ✨ 단어 추가 마법상자 ✨
        </h1>
        <p class="text-lg md:text-xl mt-4 text-gray-500">영단어를 입력하고 AI에게 부탁해봐요!</p>
    </header>

    <main class="w-full max-w-2xl bg-pastel-card rounded-3xl shadow-xl p-6 md:p-8 border-4 border-pastel-secondary">

        <!-- 단계 1: AI 생성 -->
        <div class="mb-8 p-6 bg-orange-50 rounded-2xl border-2 border-pastel-orange shadow-inner">
            <label class="block text-xl mb-2 text-orange-700">추가할 영단어</label>
            <div class="flex flex-col md:flex-row gap-3">
                <input type="text" id="inputWord"
                    class="flex-1 text-2xl p-4 border-2 border-orange-200 rounded-xl focus:outline-none focus:border-pink-300"
                    placeholder="예: Elephant" autocomplete="off">
                <button id="aiBtn"
                    class="bg-yellow-400 hover:bg-yellow-500 text-white text-xl px-6 py-4 rounded-xl shadow-md transition-colors flex items-center justify-center whitespace-nowrap">
                    🤖 AI 자동 완성
                </button>
            </div>
            <div id="aiLoading" class="hidden mt-3 text-pink-500 text-center animate-pulse">
                똑똑한 AI가 열심히 마법을 부리고 있어요... ✨ 기다려 주세요!
            </div>
        </div>

        <!-- 단계 2: 정보 확인 및 저장 -->
        <h2 class="text-2xl text-purple-600 mb-4 flex items-center gap-2">📝 내용 확인하기</h2>
        <div class="space-y-4">
            <div class="flex flex-col sm:flex-row gap-4">
                <div class="flex-1">
                    <label class="block text-gray-500 mb-1">이모지</label>
                    <input type="text" id="f_emoji" class="w-full p-3 border-2 border-gray-200 rounded-lg text-xl"
                        placeholder="예: 🐘">
                </div>
                <div class="flex-1">
                    <label class="block text-gray-500 mb-1">발음기호</label>
                    <input type="text" id="f_phonetic" class="w-full p-3 border-2 border-gray-200 rounded-lg text-xl"
                        placeholder="예: / ˈel.ɪ.fənt /">
                </div>
                <div class="flex-1">
                    <label class="block text-gray-500 mb-1">한글 읽는 법</label>
                    <input type="text" id="f_howToRead" class="w-full p-3 border-2 border-gray-200 rounded-lg text-xl"
                        placeholder="예: 엘리펀트">
                </div>
            </div>
            <div>
                <label class="block text-gray-500 mb-1">뜻과 설명 (아이들 눈높이)</label>
                <input type="text" id="f_meaning"
                    class="w-full p-3 border-2 border-gray-200 rounded-lg text-xl text-green-700"
                    placeholder="예: 코끼리 (코가 아주 긴 멋진 동물이에요!)">
            </div>
            <div>
                <label class="block text-gray-500 mb-1">영어 예문 (핵심 단어는 span 태그 적용)</label>
                <input type="text" id="f_exampleEn"
                    class="w-full p-3 border-2 border-gray-200 rounded-lg text-xl text-purple-700 font-sans font-bold">
                <p class="text-xs sm:text-sm text-gray-400 mt-1 break-all">필수형식: I saw an &lt;span class="bg-yellow-200
                    px-2 rounded-lg text-purple-900 mx-1"&gt;elephant&lt;/span&gt;.</p>
            </div>
            <div>
                <label class="block text-gray-500 mb-1">한글 예문 해석</label>
                <input type="text" id="f_exampleKo" class="w-full p-3 border-2 border-gray-200 rounded-lg text-xl"
                    placeholder="예: 나는 코끼리를 보았어요.">
            </div>
        </div>

        <button id="saveBtn"
            class="w-full mt-8 bg-pastel-primary hover:bg-pink-400 text-white text-2xl px-6 py-4 rounded-xl shadow-lg transition-transform active:scale-95 disabled:opacity-50">
            💾 Supabase에 저장하기
        </button>
    </main>

    <div class="mt-6 flex gap-4 text-3xl">
        <a href="index.html"
            class="px-4 py-2 bg-white rounded-xl shadow border-2 border-gray-200 text-xl hover:bg-gray-50 text-gray-700 transition-colors">⬅️
            영단어 마법상자로 가기</a>
    </div>

    <script>
        // === 1. 설정 ===
        let GEMINI_API_KEY = localStorage.getItem("GEMINI_API_KEY") || "";
        const SUPABASE_URL = "https://garhzjqrzvagbhtbmxdk.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdhcmh6anFyenZhZ2JodGJteGRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNjY0OTgsImV4cCI6MjA5MDc0MjQ5OH0.ZPk8KWSR0elGXUCOsgu7CADXG6PUxgx7IqE6m2QALRg";

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Sidebar Navigation DOM Elements
        const menuOpenBtn = document.getElementById("menuOpenBtn");
        const menuCloseBtn = document.getElementById("menuCloseBtn");
        const sideMenu = document.getElementById("sideMenu");
        const menuOverlay = document.getElementById("menuOverlay");

        // Menu Toggle Logic
        function toggleMenu(isOpen) {
            if (isOpen) {
                menuOverlay.classList.remove("hidden");
                setTimeout(() => menuOverlay.classList.remove("opacity-0"), 10);
                sideMenu.classList.remove("-translate-x-full");
            } else {
                menuOverlay.classList.add("opacity-0");
                sideMenu.classList.add("-translate-x-full");
                setTimeout(() => menuOverlay.classList.add("hidden"), 300);
            }
        }

        menuOpenBtn.addEventListener('click', () => toggleMenu(true));
        menuCloseBtn.addEventListener('click', () => toggleMenu(false));
        menuOverlay.addEventListener('click', () => toggleMenu(false));

        // === 2. DOM 요소 ===
        const inputWord = document.getElementById('inputWord');
        const aiBtn = document.getElementById('aiBtn');
        const aiLoading = document.getElementById('aiLoading');
        const saveBtn = document.getElementById('saveBtn');

        const f_emoji = document.getElementById('f_emoji');
        const f_phonetic = document.getElementById('f_phonetic');
        const f_howToRead = document.getElementById('f_howToRead');
        const f_meaning = document.getElementById('f_meaning');
        const f_exampleEn = document.getElementById('f_exampleEn');
        const f_exampleKo = document.getElementById('f_exampleKo');

        // === 3. Gemini API 호출 ===
        aiBtn.addEventListener('click', async () => {
            const word = inputWord.value.trim();
            if (!word) {
                alert('영단어를 입력해주세요!');
                inputWord.focus();
                return;
            }

            if (!GEMINI_API_KEY) {
                const userInput = prompt("💡 처음 접속하셨군요!\n\n발급받은 구글 Gemini API 키를 입력해 주세요.\n(입력된 키는 서버로 전송되지 않고 이 기기의 브라우저에만 안전하게 기록됩니다.)");
                if (userInput && userInput.trim() !== "") {
                    GEMINI_API_KEY = userInput.trim();
                    localStorage.setItem("GEMINI_API_KEY", GEMINI_API_KEY);
                } else {
                    alert("⚠️ API 키가 없으면 마법을 부릴 수 없습니다.");
                    return;
                }
            }

            aiBtn.disabled = true;
            aiLoading.classList.remove('hidden');

            const promptText = `너는 초등학교 어린이 영어 교육 앱의 콘텐츠 제작자야.
주어진 영단어에 대해 아이들이 재미있고 쉽게 이해할 수 있는 정보를 제공해줘.
대상 단어: "${word}"

아래의 JSON 키와 형식을 엄격하게 지켜서 순수 JSON 형식만 반환해!! (마크다운 \`\`\`json 등의 태그나 다른 부가설명 절대 금지)

{
  "emoji": "단어와 가장 잘 어울리는 직관적인 이모지 1개 (예: 🍎)",
  "phonetic": "단어의 정확한 영어 발음기호 (반드시 슬래시 포함, 예: / æp(ə)l /)",
  "how_to_read": "한국인 초등학생 5~6학년이 직관적으로 읽기 편한 한글 발음 (예: 애플)",
  "meaning": "단어의 대표적인 뜻 한국어 1~2단어 작성 후 띄어쓰고 괄호 열고 아이들이 이해하기 매우 쉬운 친절한 부연설명 괄호 닫기 (예: 사과 (둥글고 달콤하고 맛있는 빨간색 과일이에요!))",
  "example_en": "초등학생 수준의 아주 쉽고 재미있는 영어 예문. (주의: 반드시 대상 영단어 부분만 정확하게 <span class=\\"bg-yellow-200 px-2 rounded-lg text-purple-900 mx-1\\">해당단어</span> 로 감싸야 함)",
  "example_ko": "해당 예문의 자연스러운 한글 해석"
}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: promptText }] }],
                        generationConfig: {
                            temperature: 0.7,
                            responseMimeType: "application/json"
                        }
                    })
                });

                if (!response.ok) {
                    if (response.status === 403 || response.status === 400 || response.status === 404) {
                        // 키가 유출되어 막혔거나 잘못 기입한 경우 로컬스토리지에서 삭제하여 리셋
                        localStorage.removeItem("GEMINI_API_KEY");
                        GEMINI_API_KEY = "";
                        throw new Error(`API 연동 오류 (${response.status}) 🚨\n\n입력하신 키가 잘못되었거나 구글에 의해 사용이 중지되었습니다.\n확인을 누르시고 다시 'AI 자동 완성' 버튼을 클릭하여 새 키를 입력해 주세요.`);
                    }
                    throw new Error(`API 호출에 실패했습니다. (HTTP ${response.status})\n잠시 후 다시 시도해 주세요.`);
                }

                const result = await response.json();
                let jsonText = result.candidates[0].content.parts[0].text;

                // 간혹 마크다운 태그를 붙여주는 경우를 대비해 제거
                jsonText = jsonText.replace(/```json/g, '').replace(/```/g, '').trim();

                const data = JSON.parse(jsonText);

                // 화면 폼에 데이터 자동 입력
                f_emoji.value = data.emoji || "";
                f_phonetic.value = data.phonetic || "";
                f_howToRead.value = data.how_to_read || "";
                f_meaning.value = data.meaning || "";
                f_exampleEn.value = data.example_en || "";
                f_exampleKo.value = data.example_ko || "";

            } catch (err) {
                console.error(err);
                alert("AI 생성 중 에러가 발생했습니다. 개발자도구를 확인하거나 잠시 후 다시 시도해주세요.");
            } finally {
                aiBtn.disabled = false;
                aiLoading.classList.add('hidden');
            }
        });

        // === 4. Supabase 저장 (Insert) ===
        saveBtn.addEventListener('click', async () => {
            const wordData = {
                word: inputWord.value.trim(),
                emoji: f_emoji.value.trim(),
                phonetic: f_phonetic.value.trim(),
                how_to_read: f_howToRead.value.trim(),
                meaning: f_meaning.value.trim(),
                example_en: f_exampleEn.value.trim(),
                example_ko: f_exampleKo.value.trim()
            };

            if (!wordData.word) {
                alert("단어가 비어있습니다. 먼저 단어를 입력하고 AI를 실행하거나 내용을 폼에 적어주세요.");
                return;
            }

            saveBtn.disabled = true;
            saveBtn.innerText = "저장 중... ⏳";

            try {
                // Supabase words 테이블에 INSERT 요청
                const { error } = await supabaseClient
                    .from('words')
                    .insert([wordData]);

                if (error) throw error; // 에러가 있으면 catch 블록으로 이동

                alert("🎉 데이터가 성공적으로 저장되었습니다!");

                // 저장 성공 시 입력폼 자동 초기화
                inputWord.value = "";
                f_emoji.value = "";
                f_phonetic.value = "";
                f_howToRead.value = "";
                f_meaning.value = "";
                f_exampleEn.value = "";
                f_exampleKo.value = "";

                inputWord.focus();

            } catch (error) {
                console.error(error);
                alert(`Supabase 저장 중 에러가 발생했습니다: ${error.message}\n\n👉 Supabase 대시보드에서 'INSERT' 권한(RLS 정책)이 열려 있는지 꼭 확인해 주세요!`);
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerText = "💾 Supabase에 저장하기";
            }
        });
    </script>
</body>

</html>
