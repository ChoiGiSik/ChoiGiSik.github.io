<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단어 관리소 🗑️</title>
    <!-- Supabase JS 라이브러리 추가 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Jua', 'sans-serif'], },
                    colors: {
                        pastel: {
                            bg: '#FFF8E7', primary: '#FFB6C1', secondary: '#AEE1E1', card: '#FFFFFF',
                            green: '#D4EDDA', purple: '#E2D5F8', orange: '#FFD8A8', red: '#ffcccc'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Jua', sans-serif; }
    </style>
</head>
<body class="bg-pastel-bg min-h-screen text-gray-800 flex flex-col items-center py-10 px-4 overflow-x-hidden relative">

    <!-- Hamburger Menu Button -->
    <button id="menuOpenBtn" class="fixed top-4 left-4 sm:top-6 sm:left-6 z-30 p-2 sm:p-3 bg-white rounded-xl shadow-md border-2 border-pink-200 text-pink-500 hover:bg-pink-50 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 sm:h-8 sm:w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
    </button>

    <!-- Sidebar Overlay -->
    <div id="menuOverlay" class="fixed inset-0 bg-black/40 z-40 hidden opacity-0 transition-opacity duration-300"></div>

    <!-- Slide-out Menu -->
    <nav id="sideMenu" class="fixed top-0 left-0 h-full w-64 bg-pastel-card shadow-2xl z-50 transform -translate-x-full transition-transform duration-300 flex flex-col border-r-4 border-red-200">
        <div class="p-6 border-b-2 border-dashed border-red-200 flex justify-between items-center bg-red-50">
            <h2 class="text-2xl font-bold text-red-500">✨ 메뉴</h2>
            <button id="menuCloseBtn" class="text-gray-400 hover:text-red-500 transition-colors p-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
        <div class="p-6 flex flex-col gap-4 text-xl">
            <a href="index.html" class="flex items-center gap-3 p-3 rounded-xl hover:bg-pink-50 text-gray-700 hover:text-pink-600 transition-colors">
                <span>🏠</span> 단어 학습 (홈)
            </a>
            <a href="add-word.html" class="flex items-center gap-3 p-3 rounded-xl hover:bg-orange-50 text-gray-700 hover:text-orange-600 transition-colors">
                <span>➕</span> 단어 하나씩 추가
            </a>
            <a href="camera-word.html"
                class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-50 text-gray-700 hover:text-blue-600 transition-colors">
                <span>📷</span> 사진으로 단어 캡처
            </a>
            <a href="delete-word.html" class="flex items-center gap-3 p-3 rounded-xl bg-red-50 text-red-600 transition-colors shadow-sm border border-red-100 font-bold">
                <span>🗑️</span> 단어 관리/삭제
            </a>
        </div>
    </nav>

    
    <header class="text-center mb-8 mt-4">
        <h1 class="text-3xl md:text-5xl font-bold text-red-400 drop-shadow-md pb-2">
            단어 관리소 🗑️
        </h1>
        <p class="text-lg md:text-xl mt-4 text-gray-500">불필요한 단어나 테스트 데이터는 여기서 쏙쏙 지워주세요!</p>
    </header>

    <main class="w-full max-w-4xl bg-pastel-card rounded-3xl shadow-xl p-6 md:p-8 border-4 border-red-200">
        <div id="loading" class="text-center text-xl text-gray-400 py-10 animate-pulse">
            단어 목록을 불러오는 중이에요... ⏳
        </div>
        
        <div id="wordListContainer" class="hidden">
            <div class="flex flex-col sm:flex-row justify-between items-center sm:items-end mb-4 border-b-2 border-gray-100 pb-4 gap-4">
                <div class="flex items-center gap-4">
                    <select id="lessonFilter" class="bg-gray-50 border-2 border-gray-200 text-gray-700 rounded-xl px-4 py-2 font-bold focus:outline-none cursor-pointer">
                        <option value="ALL">모든 강의</option>
                    </select>
                    <p class="text-gray-500 text-lg">총 <span id="totalCount" class="text-pink-500 font-bold text-2xl">0</span>단어</p>
                </div>
                <button onclick="deleteAllFilteredWords()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 sm:px-6 sm:py-3 rounded-xl shadow-md transition-all active:scale-95 flex items-center justify-center gap-2 w-full sm:w-auto font-bold">
                    <span>⚠️ 현재 목록 삭제</span>
                </button>
            </div>
            
            <div class="overflow-x-auto rounded-xl border-2 border-gray-100 shadow-inner">
                <table class="w-full min-w-[500px] text-left border-collapse">
                    <thead>
                        <tr class="bg-red-50 border-b-2 border-red-200 text-red-700 text-lg sm:text-xl">
                            <th class="p-3 sm:p-4 whitespace-nowrap">ID</th>
                            <th class="p-3 sm:p-4 whitespace-nowrap text-center">강의명</th>
                            <th class="p-3 sm:p-4 whitespace-nowrap text-center">영단어 / 이모지</th>
                            <th class="p-3 sm:p-4 min-w-[150px]">오른쪽 뜻</th>
                            <th class="p-3 sm:p-4 whitespace-nowrap text-center">관리</th>
                        </tr>
                    </thead>
                    <tbody id="wordTableBody">
                        <!-- JS에서 동적으로 채워짐 -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div class="mt-8 flex flex-wrap justify-center gap-4 text-xl sm:text-2xl">
        <a href="index.html" class="px-6 py-3 bg-white rounded-xl shadow border-2 border-gray-200 hover:bg-gray-50 text-gray-700 transition-colors">⬅️ 메인으로 가기</a>
        <a href="add-word.html" class="px-6 py-3 bg-pastel-orange rounded-xl shadow hover:bg-orange-300 text-orange-900 transition-colors">➕ 단어 추가하기</a>
    </div>

    <script>
        const SUPABASE_URL = "https://garhzjqrzvagbhtbmxdk.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdhcmh6anFyenZhZ2JodGJteGRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNjY0OTgsImV4cCI6MjA5MDc0MjQ5OH0.ZPk8KWSR0elGXUCOsgu7CADXG6PUxgx7IqE6m2QALRg";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Sidebar Navigation DOM Elements
        const menuOpenBtn = document.getElementById("menuOpenBtn");
        const menuCloseBtn = document.getElementById("menuCloseBtn");
        const sideMenu = document.getElementById("sideMenu");
        const menuOverlay = document.getElementById("menuOverlay");

        // Menu Toggle Logic
        function toggleMenu(isOpen) {
            if (isOpen) {
                menuOverlay.classList.remove("hidden");
                setTimeout(() => menuOverlay.classList.remove("opacity-0"), 10);
                sideMenu.classList.remove("-translate-x-full");
            } else {
                menuOverlay.classList.add("opacity-0");
                sideMenu.classList.add("-translate-x-full");
                setTimeout(() => menuOverlay.classList.add("hidden"), 300);
            }
        }

        menuOpenBtn.addEventListener('click', () => toggleMenu(true));
        menuCloseBtn.addEventListener('click', () => toggleMenu(false));
        menuOverlay.addEventListener('click', () => toggleMenu(false));

        const loading = document.getElementById('loading');
        const wordListContainer = document.getElementById('wordListContainer');
        const wordTableBody = document.getElementById('wordTableBody');
        const totalCount = document.getElementById('totalCount');

        const lessonFilter = document.getElementById('lessonFilter');

        let allWordsRaw = [];
        let filteredWords = [];

        // 단어 목록 가져오기
        async function fetchWords() {
            loading.classList.remove('hidden');
            wordListContainer.classList.add('hidden');
            wordTableBody.innerHTML = '';

            try {
                const { data, error } = await supabaseClient
                    .from('words')
                    .select('*')
                    .order('id', { ascending: false });

                if (error) throw error;

                allWordsRaw = data || [];
                populateLessonFilter();
                applyFilter();

            } catch (err) {
                console.error(err);
                wordTableBody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-red-400 text-xl font-bold">데이터를 불러오는 데 실패했습니다.<br><span class="text-sm mt-2 font-sans font-normal">${err.message}</span></td></tr>`;
                loading.classList.add('hidden');
                wordListContainer.classList.remove('hidden');
            }
        }

        function populateLessonFilter() {
            const uniqueLessons = [...new Set(allWordsRaw.map(w => String(w.lesson || '미지정')))];
            const currentSelection = lessonFilter.value;
            
            lessonFilter.innerHTML = '<option value="ALL">모든 강의</option>';
            uniqueLessons.forEach(lesson => {
                const opt = document.createElement('option');
                opt.value = lesson;
                opt.textContent = lesson;
                lessonFilter.appendChild(opt);
            });

            if (Array.from(lessonFilter.options).some(o => o.value === currentSelection)) {
                lessonFilter.value = currentSelection;
            } else {
                lessonFilter.value = "ALL";
            }
        }

        function applyFilter() {
            const selected = lessonFilter.value;
            if (selected === "ALL") {
                filteredWords = [...allWordsRaw];
            } else {
                filteredWords = allWordsRaw.filter(w => String(w.lesson || '미지정') === selected);
            }

            renderTable();
        }

        lessonFilter.addEventListener('change', applyFilter);

        function renderTable() {
            wordTableBody.innerHTML = '';
            totalCount.innerText = filteredWords.length;

            if (filteredWords.length === 0) {
                wordTableBody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-gray-400 text-xl">표시할 단어가 없습니다.</td></tr>`;
            } else {
                filteredWords.forEach(item => {
                    const tr = document.createElement('tr');
                    tr.className = "border-b border-gray-100 hover:bg-gray-50 transition-colors";
                    const lessonText = item.lesson || '미지정';
                    
                    tr.innerHTML = `
                        <td class="p-3 sm:p-4 text-gray-400 whitespace-nowrap">${item.id}</td>
                        <td class="p-3 sm:p-4 text-blue-500 font-bold text-center whitespace-nowrap">${lessonText}</td>
                        <td class="p-3 sm:p-4 text-xl sm:text-2xl font-bold text-gray-800 text-center whitespace-nowrap">${item.word} <span class="text-2xl sm:text-3xl ml-1">${item.emoji || ''}</span></td>
                        <td class="p-3 sm:p-4 text-gray-600 text-base sm:text-lg min-w-[150px] break-keep">${item.meaning || '<span class="text-gray-300">뜻 없음</span>'}</td>
                        <td class="p-4 text-center">
                            <button onclick="deleteWord(${item.id}, '${item.word.replace(/'/g, "\\'")}')" 
                                class="bg-red-100 hover:bg-red-500 text-red-500 hover:text-white px-4 py-2 rounded-xl border border-red-200 hover:border-red-500 shadow-sm transition-all active:scale-95 whitespace-nowrap font-bold">
                                ❌ 삭제
                            </button>
                        </td>
                    `;
                    wordTableBody.appendChild(tr);
                });
            }

            loading.classList.add('hidden');
            wordListContainer.classList.remove('hidden');
        }



        // 단어 삭제 함수
        window.deleteWord = async function(id, wordText) {
            const confirmed = confirm(`정말로 [ ${wordText} ] 단어를 데이터베이스에서 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`);
            if(!confirmed) return;

            try {
                // Supabase에서 특정 ID 삭제 처리
                const { error } = await supabaseClient
                    .from('words')
                    .delete()
                    .eq('id', id);

                if (error) throw error; // RLS 에러 발생시 여기로 빠짐

                // 삭제 성공 시 리프레시 방식을 쓸 수도 있지만 전체 새로고침이 UX상 깔끔할 수 있음. 
                // 혹은 fetchWords() 다시 호출
                alert(`[ ${wordText} ] 단어가 성공적으로 삭제되었습니다! 🧹`);
                fetchWords();

            } catch (err) {
                console.error(err);
                alert(`삭제 실패! 권한 문제가 발생했습니다.\n\n에러 메시지: ${err.message}\n\n👉 관리자에게 'DELETE' 권한 오픈을 요청하세요 (Supabase RLS 체크).`);
            }
        };

        // 단어 전체 삭제 함수
        window.deleteAllFilteredWords = async function() {
            if (filteredWords.length === 0) return;

            const selected = lessonFilter.value;
            const targetText = selected === "ALL" ? "데이터베이스의 [모든 단어]" : `[${selected}] 강의의 모든 단어`;

            const confirmed1 = confirm(`정말로 ${targetText}를 한 번에 삭제하시겠습니까?\n총 ${filteredWords.length}개가 지워지며 되돌릴 수 없습니다!`);
            if (!confirmed1) return;

            const confirmed2 = confirm("마지막 확인: 진짜로 전부 다 비우시겠습니까? 💥");
            if (!confirmed2) return;

            try {
                let query = supabaseClient.from('words').delete();
                
                if (selected === "ALL") {
                    query = query.neq('id', -1);
                } else {
                    query = query.eq('lesson', selected);
                }

                const { error } = await query;

                if (error) throw error; 

                alert(`${targetText}가 깨끗하게 비워졌습니다! 🧹✨`);
                fetchWords();

            } catch (err) {
                console.error(err);
                alert(`전체 삭제 실패!\n\n에러 메시지: ${err.message}\n👉 전체 삭제 권한이 막혀있을 수 있습니다.`);
            }
        };

        // 페이지가 열리면 즉시 단어 목록 불러오기
        document.addEventListener('DOMContentLoaded', fetchWords);
    </script>
</body>
</html>
