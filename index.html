<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">

    <title>신기한 영단어 마법상자 ✨</title>

    <!-- 구글 폰트(Jua: 귀엽고 둥근 한국어 폰트) -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Jua', 'sans-serif'],
                    },
                    colors: {
                        pastel: {
                            bg: '#FFF8E7',      // 아주 따뜻한 상아색
                            primary: '#FFB6C1', // 부드러운 분홍 (입력버튼)
                            secondary: '#AEE1E1', // 하늘색 (카드 테두리, 포인트)
                            card: '#FFFFFF',
                            green: '#D4EDDA',
                            purple: '#E2D5F8',
                            orange: '#FFD8A8',
                        }
                    },
                    animation: {
                        'wiggle': 'wiggle 2s ease-in-out infinite',
                        'stamp': 'stamp 0.5s ease-out forwards',
                        'float': 'float 3s ease-in-out infinite',
                    },
                    keyframes: {
                        wiggle: {
                            '0%, 100%': { transform: 'rotate(-3deg)' },
                            '50%': { transform: 'rotate(3deg)' },
                        },
                        stamp: {
                            '0%': { opacity: '0', transform: 'scale(2.5) rotate(-20deg)' },
                            '100%': { opacity: '1', transform: 'scale(1) rotate(-5deg)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Jua', sans-serif;
        }

        .text-outline {
            -webkit-text-stroke: 1.5px #fff;
        }

        ::placeholder {
            color: #d1d5db;
        }
    </style>
</head>

    <!-- Search Section -->
    <main
        class="w-full max-w-2xl bg-pastel-card rounded-3xl shadow-xl p-6 md:p-8 border-4 border-pastel-secondary relative z-20">

        <!-- Lesson Filter -->

            <select id="lessonFilter"

        <!-- Result Section (Main Word Display) -->

            <!-- Header of Result: Word and Pronunciation -->
            <div class="flex flex-row justify-between items-start mb-6 gap-3 sm:gap-4 relative">
                <div class="flex-1 overflow-visible">
                    <!-- English Word -->
                    <h2 id="wordTitle"
                        class="text-4xl sm:text-5xl md:text-6xl text-purple-600 drop-shadow-sm flex items-center gap-2 flex-wrap break-keep">

                        <!-- Korean Reading Guide -->

                <!-- TTS Audio Button -->
                <button id="ttsButton"

                    <svg xmlns="http://www.w3.org/2000/svg"

                        fill="none" viewBox="0 0 24 24" stroke="currentColor">

                </div>

                <!-- Example Sentence Box -->
                <div
                    class="bg-pastel-purple rounded-2xl p-5 md:p-6 shadow-sm border-2 border-purple-200 hover:shadow-md transition-shadow">
                    <h3
                        class="text-xl md:text-2xl text-purple-700 mb-3 flex flex-wrap justify-between items-center w-full gap-2">
                        <span class="flex items-center gap-2"><span class="text-2xl">📝</span> 문장으로 배워요!</span>
                        <button id="sentenceTtsBtn"
                            class="bg-purple-200 hover:bg-purple-300 text-purple-800 rounded-full p-2.5 transition-colors shadow-sm flex items-center justify-center flex-shrink-0"

                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"

                            </svg>
                        </button>
                    </h3>
                    <p id="wordExampleEn"
                        class="text-2xl md:text-3xl text-gray-800 mb-2 font-sans font-bold tracking-tight">I ate a
                        delicious <span class="bg-yellow-200 px-2 rounded-lg text-purple-900 mx-1">apple</span>.</p>
                    <p id="wordExampleKo" class="text-xl md:text-2xl text-gray-600">나는 맛있는 사과를 먹었어요.</p>
                </div>
            </div>

            <!-- Slide Controls -->
            <div class="flex justify-between items-center mt-8 pt-6 border-t-2 border-dashed border-gray-200">
                <button id="prevBtn"
                    class="bg-white hover:bg-gray-50 text-gray-700 px-4 py-2 sm:px-6 sm:py-3 rounded-2xl border-2 border-gray-200 shadow-sm flex items-center gap-1 sm:gap-2 transition-colors active:scale-95 whitespace-nowrap">
                    <span class="text-xl sm:text-2xl">◀️</span> <span
                        class="hidden sm:inline-block text-xl md:text-2xl">이전 단어</span>
                </button>
                <div id="slideIndicator" class="flex items-center gap-2"></div>
                <button id="nextBtn"
                    class="bg-white hover:bg-gray-50 text-gray-700 px-4 py-2 sm:px-6 sm:py-3 rounded-2xl border-2 border-gray-200 shadow-sm flex items-center gap-1 sm:gap-2 transition-colors active:scale-95 whitespace-nowrap">
                    <span class="hidden sm:inline-block text-xl md:text-2xl">다음 단어</span> <span
                        class="text-xl sm:text-2xl">▶️</span>

    <!-- Footer Character/Illustration Mockup -->
    <div class="mt-10 flex gap-6 animate-wiggle opacity-90 z-10 text-6xl select-none">

        <div>🦊</div>

    <!-- Simple interaction script with Slider -->
    <script>
        // 1. Supabase Initialization
        const SUPABASE_URL = "https://garhzjqrzvagbhtbmxdk.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdhcmh6anFyenZhZ2JodGJteGRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNjY0OTgsImV4cCI6MjA5MDc0MjQ5OH0.ZPk8KWSR0elGXUCOsgu7CADXG6PUxgx7IqE6m2QALRg";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let repeatCountConfig = 1; // DB에서 가져올 반복 횟수 기본값 1
        let sentenceSpeedConfig = 0.5; // DB에서 가져올 예문 읽기 속도 기본값
        let allWordsRaw = []; // DB에서 가져온 원본 전체 데이터
        let wordsList = []; // 현재 필터링되어 화면에 표시할 데이터
        let currentIndex = 0;

        // 2. DOM Elements
        const wordTitle = document.getElementById("wordTitle");
        const wordPhonetic = document.getElementById("wordPhonetic");
        const wordHowToRead = document.getElementById("wordHowToRead");
        const wordMeaning = document.getElementById("wordMeaning");
        const wordExampleEn = document.getElementById("wordExampleEn");
        const wordExampleKo = document.getElementById("wordExampleKo");
        const ttsButton = document.getElementById("ttsButton");
        const sentenceTtsBtn = document.getElementById("sentenceTtsBtn");
        const prevBtn = document.getElementById("prevBtn");
        const nextBtn = document.getElementById("nextBtn");
        const slideIndicator = document.getElementById("slideIndicator");
        const resultArea = document.getElementById("resultArea");
        const lessonFilter = document.getElementById("lessonFilter");

        // Sidebar Navigation DOM Elements
        const menuOpenBtn = document.getElementById("menuOpenBtn");
        const menuCloseBtn = document.getElementById("menuCloseBtn");
        const sideMenu = document.getElementById("sideMenu");
        const menuOverlay = document.getElementById("menuOverlay");

        // 2-1. Navigation Menu Toggle Logic
        function toggleMenu(isOpen) {
            if (isOpen) {
                menuOverlay.classList.remove("hidden");
                // setTimeout ensures CSS transition applies after display:block
                setTimeout(() => menuOverlay.classList.remove("opacity-0"), 10);
                sideMenu.classList.remove("-translate-x-full");
            } else {
                menuOverlay.classList.add("opacity-0");
                sideMenu.classList.add("-translate-x-full");
                setTimeout(() => menuOverlay.classList.add("hidden"), 300); // Wait for transition
            }
        }

        menuOpenBtn.addEventListener('click', () => toggleMenu(true));
        menuCloseBtn.addEventListener('click', () => toggleMenu(false));
        menuOverlay.addEventListener('click', () => toggleMenu(false));

        // 3. Render Pagination (Numbering)
        function renderDots() {
            slideIndicator.innerHTML = "";
            slideIndicator.className = "flex justify-center items-center px-5 py-2 bg-gray-50 rounded-full border-2 border-dashed border-gray-200 shadow-inner";

            const numberText = document.createElement("span");
            numberText.className = "text-xl md:text-2xl font-bold text-gray-400 tracking-widest font-sans";
            // ex: 1 / 50
            numberText.innerHTML = `<span class="text-pink-500">${currentIndex + 1}</span> / ${wordsList.length}`;

            slideIndicator.appendChild(numberText);
        }

        // 4. Render Word
        function renderWord(index) {
            const data = wordsList[index];

            // Fade out effect
            resultArea.classList.remove("opacity-100");
            resultArea.classList.add("opacity-50", "transition-opacity", "duration-300");

            setTimeout(() => {
                wordTitle.innerHTML = `${data.word} ${data.emoji}`;
                wordPhonetic.textContent = data.phonetic;
                wordHowToRead.textContent = data.howToRead;
                wordMeaning.textContent = data.meaning;
                wordExampleEn.innerHTML = data.exampleEn;
                wordExampleKo.textContent = data.exampleKo;
                renderDots();

                // Fade in effect
                resultArea.classList.remove("opacity-50");
                resultArea.classList.add("opacity-100");
            }, 150);
        }

        // 5. Event Listeners for Slide
        prevBtn.addEventListener("click", () => {
            if (currentIndex > 0) {
                currentIndex--;
            } else {
                currentIndex = wordsList.length - 1; // loop back to end
            }
            renderWord(currentIndex);
        });

        nextBtn.addEventListener("click", () => {
            if (currentIndex < wordsList.length - 1) {
                currentIndex++;
            } else {
                currentIndex = 0; // loop back to start
            }
            renderWord(currentIndex);
        });

        // 5-2. Touch Swipe Events for Mobile
        let touchStartX = 0;
        let touchEndX = 0;

        function handleSwipeGesture() {
            // Swipe Left -> Next word
            if (touchEndX < touchStartX - 50) {
                if (currentIndex < wordsList.length - 1) {
                    currentIndex++;
                } else {
                    currentIndex = 0;
                }
                renderWord(currentIndex);
            }
            // Swipe Right -> Previous word
            if (touchEndX > touchStartX + 50) {
                if (currentIndex > 0) {
                    currentIndex--;
                } else {
                    currentIndex = wordsList.length - 1;
                }
                renderWord(currentIndex);
            }
        }

        resultArea.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        resultArea.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipeGesture();
        }, { passive: true });

        // 6. Web Speech API for TTS
        let currentUtterance; // 전역 변수로 선언하여 모바일 Safari(iOS) 가비지 컬렉션에 의해 음성이 끊기는 버그 방지
        let currentRepeatIndex = 0;
        let isSpeaking = false;

        function speakTextWithRepeat(text, maxRepeat, targetButton, speechRate = 0.9) {
            window.speechSynthesis.cancel();
            window.speechSynthesis.resume();

            currentRepeatIndex = 0;
            isSpeaking = true;
            targetButton.classList.add('animate-pulse');

            function speakNext() {
                if (!isSpeaking || currentRepeatIndex >= maxRepeat) {
                    targetButton.classList.remove('animate-pulse');
                    isSpeaking = false;
                    return;
                }

                currentUtterance = new SpeechSynthesisUtterance(text);
                currentUtterance.lang = 'en-US';
                // 아이들에게 친근한 높은 톤 설정
                currentUtterance.pitch = 1.3;
                // 속도를 유동적으로 적용 (문장은 더 느리게)
                currentUtterance.rate = speechRate;

                currentUtterance.onend = () => {
                    currentRepeatIndex++;
                    // 다음 반복 전 0.6초 대기
                    setTimeout(speakNext, 600);
                };

                currentUtterance.onerror = (e) => {
                    console.error('TTS Error:', e);
                    targetButton.classList.remove('animate-pulse');
                    isSpeaking = false;
                };

                window.speechSynthesis.speak(currentUtterance);
            }

            speakNext();
        }

        if ('speechSynthesis' in window) {
            // 메인 단어 듣기 (설정 횟수 반복)
            ttsButton.addEventListener('click', () => {
                const wordText = wordsList[currentIndex].word;
                speakTextWithRepeat(wordText, repeatCountConfig, ttsButton, 0.9); // 단어는 살짝 경쾌하게
            });

            // 예문 듣기 (기본 1회, 문장이므로 좀 더 천천히)
            sentenceTtsBtn.addEventListener('click', () => {
                // HTML 태그(색상 하이라이팅 등) 제거를 위한 정규식
                const rawExampleHtml = wordsList[currentIndex].exampleEn;
                const cleanExampleText = rawExampleHtml.replace(/<[^>]*>?/gm, '');

                if (cleanExampleText.trim() === "No data found in Supabase.") return;

                speakTextWithRepeat(cleanExampleText, 1, sentenceTtsBtn, sentenceSpeedConfig); // 설정된 속도 적용
            });
        }

        // 7. Supabase에서 데이터 가져오기
        async function fetchWords() {
            try {
                // 초기에 흐리게 처리
                resultArea.classList.remove("opacity-100");
                resultArea.classList.add("opacity-50");

                // Config 테이블에서 재생 횟수 및 속도 가져오기
                const configResponse = await supabaseClient.from('config').select('count, speed');
                console.log("Config response:", configResponse.data, configResponse.error);
                if (configResponse.data && configResponse.data.length > 0) {
                    if (configResponse.data[0].count !== undefined) {
                        repeatCountConfig = parseInt(configResponse.data[0].count, 10) || 1;
                    }
                    if (configResponse.data[0].speed !== undefined) {
                        sentenceSpeedConfig = parseFloat(configResponse.data[0].speed) || 0.5;
                    }
                }
                console.log("적용된 반복 재생 횟수:", repeatCountConfig, "| 예문 읽기 속도:", sentenceSpeedConfig);

                const { data, error } = await supabaseClient.from('words').select('*').order('id', { ascending: true });

                if (error) {
                    throw error;
                }

                if (data && data.length > 0) {
                    allWordsRaw = data.map(item => ({
                        word: item.word,
                        emoji: item.emoji || "",
                        phonetic: item.phonetic || "",
                        howToRead: item.how_to_read || "",
                        meaning: item.meaning || "",
                        exampleEn: item.example_en || "",
                        exampleKo: item.example_ko || "",
                        lesson: item.lesson || "미지정"
                    }));

                    // 강의 목록 추출 및 드롭다운 세팅
                    populateLessonFilter();
                    applyLessonFilter();

                } else {
                    // 데이터가 0건인 경우 안내 표시
                    showEmptyData();
                }
            } catch (error) {
                console.error("데이터 불러오기 에러:", error);

                // 에러 발생 시 UI 에러 표시
                wordTitle.innerHTML = `불러오기 에러 🚫`;
                wordPhonetic.textContent = "";
                wordHowToRead.textContent = "에러";
                wordMeaning.textContent = `Supabase 연동 오류: ${error.message}`;
                wordExampleEn.innerHTML = "Please check console and Supabase settings.";
                wordExampleKo.textContent = "";

                resultArea.classList.remove("opacity-50");
                resultArea.classList.add("opacity-100");
            }
        }

        function populateLessonFilter() {
            // "ALL" 제외한 유니크 강의 목록
            const uniqueLessons = [...new Set(allWordsRaw.map(w => String(w.lesson)))];

            // 현재 선택값 기억 (리렌더링 시 유지)
            const currentSelection = lessonFilter.value;

            lessonFilter.innerHTML = '<option value="ALL">전체 강의</option>';
            uniqueLessons.forEach(lesson => {
                const opt = document.createElement('option');
                opt.value = lesson;
                opt.textContent = lesson;
                lessonFilter.appendChild(opt);
            });

            // 옵션 중에 기존 선택값이 있다면 복구
            if (Array.from(lessonFilter.options).some(o => o.value === currentSelection)) {
                lessonFilter.value = currentSelection;
            } else {
                lessonFilter.value = "ALL";
            }
        }

        function applyLessonFilter() {
            const selected = lessonFilter.value;
            if (selected === "ALL") {
                wordsList = [...allWordsRaw];
            } else {
                wordsList = allWordsRaw.filter(w => String(w.lesson) === selected);
            }

            if (wordsList.length > 0) {
                currentIndex = 0;
                renderWord(currentIndex);
            } else {
                showEmptyData();
            }
        }

        lessonFilter.addEventListener('change', () => {
            applyLessonFilter();
        });

        function showEmptyData() {
            wordTitle.innerHTML = `데이터 없음 😢`;
            wordPhonetic.textContent = "";
            wordHowToRead.textContent = "?";
            wordMeaning.textContent = "조건에 맞는 단어가 없습니다.";
            wordExampleEn.innerHTML = "";
            wordExampleKo.textContent = "";
            slideIndicator.innerHTML = "";

            resultArea.classList.remove("opacity-50");
            resultArea.classList.add("opacity-100");
        }

        // Initialize
        fetchWords();
    </script>
</body>

</html>
